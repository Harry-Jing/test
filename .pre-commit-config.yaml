default_install_hook_types: [pre-commit, commit-msg, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=1024]
        exclude: ^src/vrc_live_caption/chatbox/fonts/.*\.(?:otf|ttf)$
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-check
        args: [--fix]
        types_or: [python, pyi, pyproject]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: check-commit-message
        name: check commit message
        language: pygrep
        entry: |-
          (?x)\A
          # commit type
          (build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)
          # optional scope
          (\([^()\r\n]+\))?
          # optional breaking marker and separator
          !?:
          [ ]
          # required emoji
          (?:📦️?|🔧|👷|📝|✨|🐛|⚡️?|♻️?|⏪️?|🎨|✅|💥)
          [ ]
          # required subject
          [^\r\n]+
          # optional body
          (?:\r?\n[\s\S]*)?
          \Z
        args: [--multiline, --negate]
        stages: [commit-msg]
      - id: ty-check
        name: ty check
        entry: uv run ty check
        language: system
        pass_filenames: false
        always_run: true
      - id: pytest
        name: pytest
        entry: uv run pytest -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
