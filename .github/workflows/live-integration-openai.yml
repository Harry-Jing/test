name: Live Integration / OpenAI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  openai-live:
    name: openai live integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Check required secret
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY is not set"
            exit 1
          fi

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run OpenAI live integration test
        run: uv run pytest -q tests/integration -m "integration and openai_live"
