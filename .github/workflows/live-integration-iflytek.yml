name: Live Integration / iFLYTEK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  iflytek-live:
    name: iflytek live integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      IFLYTEK_APP_ID: ${{ secrets.IFLYTEK_APP_ID }}
      IFLYTEK_API_KEY: ${{ secrets.IFLYTEK_API_KEY }}
      IFLYTEK_API_SECRET: ${{ secrets.IFLYTEK_API_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Check required secrets
        run: |
          if [ -z "${IFLYTEK_APP_ID}" ] || [ -z "${IFLYTEK_API_KEY}" ] || [ -z "${IFLYTEK_API_SECRET}" ]; then
            echo "IFLYTEK_APP_ID / IFLYTEK_API_KEY / IFLYTEK_API_SECRET must all be set"
            exit 1
          fi

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run iFLYTEK live integration test
        run: uv run pytest -q tests/integration -m "integration and iflytek_live"
